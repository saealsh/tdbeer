<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تدبير — المنظومة المالية المتكاملة</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* دمج الهوية البصرية والخطوط */
        @font-face {
            font-family: 'Gumela';
            src: local('Gumela'), url('Gumela.ttf') format('truetype');
        }

        :root {
            --bg-deep: #0a0c14;
            --bg-card: #161b29;
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --font-display: 'Gumela', 'Tajawal', sans-serif;
        }

        * { box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: var(--font-display);
            background: var(--bg-deep);
            color: var(--text-main);
            margin: 0; padding-bottom: 100px;
            overflow-x: hidden;
        }

        /* 1. الهيدر وستريك الحضور */
        .app-header {
            padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(22, 27, 41, 0.9);
            backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .streak-container {
            background: linear-gradient(45deg, #f59e0b, #ef4444);
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 14px;
            display: flex; align-items: center; gap: 6px;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
            cursor: pointer;
        }

        /* 2. لوحة التحكم المالية الشاملة */
        .main-container { max-width: 500px; margin: 0 auto; padding: 15px; }

        .dashboard-card {
            background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
            border-radius: 28px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }

        .balance-label { font-size: 12px; color: rgba(255,255,255,0.7); }
        .balance-value { font-size: 36px; font-weight: 900; margin: 8px 0; font-family: 'Tajawal'; }

        .stats-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 12px; margin-top: 20px;
        }

        .mini-stat {
            background: rgba(255,255,255,0.05);
            padding: 12px; border-radius: 16px;
            border: 1px solid var(--border);
        }

        /* 3. فلاتر العرض الزمني */
        .time-filters {
            display: flex; gap: 8px; margin-bottom: 20px;
            overflow-x: auto; padding-bottom: 5px;
        }
        .filter-btn {
            background: var(--bg-card); border: 1px solid var(--border);
            color: var(--text-muted); padding: 8px 20px;
            border-radius: 12px; font-size: 12px; cursor: pointer; white-space: nowrap;
        }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* 4. التحليل والمقارنة (الرسوم البيانية) */
        .chart-box {
            background: var(--bg-card);
            border-radius: 24px; padding: 20px;
            margin-bottom: 20px; border: 1px solid var(--border);
        }

        .bar-chart {
            display: flex; align-items: flex-end; gap: 10px;
            height: 120px; margin-top: 20px;
        }
        .bar { flex: 1; border-radius: 6px 6px 0 0; position: relative; }
        .bar.current { background: var(--primary); }
        .bar.prev { background: var(--text-muted); opacity: 0.3; }

        /* 5. القائمة السفلية (حل مشكلة عدم الاستجابة) */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(22, 27, 41, 0.98);
            height: 85px; display: flex;
            justify-content: space-around; align-items: center;
            border-top: 1px solid var(--border);
            padding-bottom: 20px; z-index: 2000;
        }

        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            gap: 4px; color: var(--text-muted); font-size: 10px;
            cursor: pointer; background: none; border: none; width: 20%;
        }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 22px; margin-bottom: 2px; }

        .center-add {
            width: 60px; height: 60px;
            background: var(--primary); border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 30px; margin-top: -45px;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
        }

        /* نافذة الإدخال (Modal) */
        .modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            display: none; justify-content: center; align-items: flex-end;
            z-index: 3000;
        }
        .modal-content {
            background: var(--bg-card); width: 100%;
            border-radius: 30px 30px 0 0; padding: 30px;
            animation: slideUp 0.4s ease-out;
        }

        input, select {
            width: 100%; background: var(--bg-deep);
            border: 1px solid var(--border); color: white;
            padding: 15px; border-radius: 15px; margin-bottom: 15px;
            font-family: var(--font-display);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header class="app-header">
        <div style="display: flex; align-items: center; gap: 10px;">
            <img src="Vlogo2.svg" style="height: 35px;" alt="Logo">
            <span style="font-weight: 900; font-size: 20px;">تدبير</span>
        </div>
        <div class="streak-container" onclick="recordAttendance()">
            <span>🔥</span>
            <span id="streakDays">14 يوم</span>
        </div>
    </header>

    <main class="main-container">
        <div class="dashboard-card">
            <span class="balance-label">المتبقي من الميزانية</span>
            <div class="balance-value" id="balanceDisplay">12,450.00 SAR</div>
            
            <div style="display: flex; justify-content: space-between; font-size: 11px; margin-top: 15px;">
                <span>نسبة الإنفاق من الدخل</span>
                <span id="spendPercent">32%</span>
            </div>
            <div style="height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 8px; overflow: hidden;">
                <div id="progressBar" style="width: 32%; height: 100%; background: var(--success);"></div>
            </div>

            <div class="stats-grid">
                <div class="mini-stat">
                    <span class="balance-label">الدخل</span>
                    <div style="color: var(--success); font-weight: 700;">+18,000</div>
                </div>
                <div class="mini-stat">
                    <span class="balance-label">المصاريف</span>
                    <div style="color: var(--danger); font-weight: 700;">-5,550</div>
                </div>
            </div>
        </div>

        <div class="time-filters">
            <button class="filter-btn active">اليوم</button>
            <button class="filter-btn">الأسبوع</button>
            <button class="filter-btn">الشهر</button>
            <button class="filter-btn">السنوات</button>
        </div>

        <div class="chart-box">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: 800;">تحليل المصاريف المقارن</span>
                <span style="font-size: 10px; color: var(--text-muted);">الشهر الحالي vs السابق</span>
            </div>
            <div class="bar-chart">
                <div class="bar prev" style="height: 70%;"></div>
                <div class="bar current" style="height: 50%;"></div>
                <div class="bar prev" style="height: 90%;"></div>
                <div class="bar current" style="height: 80%;"></div>
                <div class="bar prev" style="height: 40%;"></div>
                <div class="bar current" style="height: 30%;"></div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="mini-stat" style="text-align: center; cursor: pointer;">
                <span>🛒</span>
                <div style="font-size: 12px; margin-top: 5px;">مشتريات يومية</div>
            </div>
            <div class="mini-stat" style="text-align: center; cursor: pointer;">
                <span>🏠</span>
                <div style="font-size: 12px; margin-top: 5px;">مصاريف ثابتة</div>
            </div>
        </div>
    </main>

    <div class="modal" id="addModal">
        <div class="modal-content">
            <h3 style="margin-top: 0; margin-bottom: 20px;">تسجيل عملية مالية</h3>
            <select id="transType">
                <option value="expense">مصروف (سحب)</option>
                <option value="income">دخل (إيداع)</option>
                <option value="saving">توفير (هدف)</option>
            </select>
            <input type="text" id="transName" placeholder="وصف العملية (مثلاً: فاتورة الكهرباء)">
            <input type="number" id="transAmount" placeholder="المبلغ">
            <button onclick="processTransaction()" style="width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 900; cursor: pointer;">تأكيد وحفظ</button>
            <button onclick="closeModal()" style="width: 100%; background: transparent; color: var(--text-muted); border: none; padding: 10px; margin-top: 10px; cursor: pointer;">إلغاء</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active"><span>🏠</span><span>الرئيسية</span></button>
        <button class="nav-item"><span>📊</span><span>التقارير</span></button>
        <button class="center-add" onclick="openModal()"><span>+</span></button>
        <button class="nav-item"><span>🎯</span><span>الأهداف</span></button>
        <button class="nav-item"><span>⚙️</span><span>الإعدادات</span></button>
    </nav>

    <script>
        // 1. حل مشكلة استجابة الأزرار: التأكد من تحميل العناصر قبل ربط الدوال
        let state = {
            balance: 12450.00,
            streak: 14,
            lastAttendance: null
        };

        function openModal() {
            document.getElementById('addModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('addModal').style.display = 'none';
        }

        // 2. نظام الستريك (Daily Streak)
        function recordAttendance() {
            const now = new Date().toDateString();
            if (state.lastAttendance !== now) {
                state.streak++;
                state.lastAttendance = now;
                document.getElementById('streakDays').innerText = state.streak + " يوم";
                alert("تم تسجيل حضورك بنجاح! 🔥");
            } else {
                alert("لقد قمت بتسجيل الحضور اليوم مسبقاً.");
            }
        }

        // 3. معالجة العمليات المالية (الدخل، المصاريف، التوفير)
        function processTransaction() {
            const type = document.getElementById('transType').value;
            const amount = parseFloat(document.getElementById('transAmount').value);
            const name = document.getElementById('transName').value;

            if (!amount || !name) return alert("يرجى إكمال البيانات");

            if (type === 'expense') {
                state.balance -= amount;
            } else if (type === 'income') {
                state.balance += amount;
            }

            // تحديث الواجهة
            document.getElementById('balanceDisplay').innerText = state.balance.toLocaleString() + " SAR";
            
            // تحديث شريط التقدم (مثال)
            let percent = Math.min((5550 / 18000) * 100, 100); 
            document.getElementById('spendPercent').innerText = percent.toFixed(0) + "%";
            document.getElementById('progressBar').style.width = percent + "%";

            closeModal();
            // تصفير الحقول
            document.getElementById('transAmount').value = '';
            document.getElementById('transName').value = '';
        }

        // إغلاق المودال عند الضغط خارجه
        window.onclick = function(event) {
            const modal = document.getElementById('addModal');
            if (event.target == modal) closeModal();
        }
    </script>
</body>
</html>
