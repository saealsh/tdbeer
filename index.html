<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تدّبير PRO — مخططك المالي الذكي</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Tajawal:wght@400;500;800&display=swap" rel="stylesheet">

    <style>
        /* ═══════════════════════════════
           المتغيرات والأنماط الأساسية (Performance First)
        ═══════════════════════════════ */
        :root {
            --bg-body: #f8f9fa;
            --bg-card: #ffffff;
            --accent: #2ecc71;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --border: #edf2f7;
            --pro-gold: #f1c40f;
            --font-main: 'Tajawal', sans-serif;
        }

        /* أنماط الثيمات */
        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #b0b0b0;
            --border: #333333;
        }

        [data-theme="midnight"] {
            --bg-body: #05070a;
            --bg-card: #0d1117;
            --text-main: #ffffff;
            --border: #21262d;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            transition: background 0.3s ease;
            overflow-x: hidden;
        }

        /* ═══════════════════════════════
           الهيدر المطور (Pro Header)
        ═══════════════════════════════ */
        .app-hero {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(12px);
            padding: 12px 0;
        }

        .hero-container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 0 16px;
        }

        /* الشعار - الحجم المطور */
        .hero-logo-img {
            height: 85px;
            width: auto;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            filter: none; /* الافتراضي للوضع الفاتح */
        }

        [data-theme="dark"] .hero-logo-img,
        [data-theme="midnight"] .hero-logo-img {
            filter: invert(1) brightness(2);
        }

        /* الأزرار الجانبية */
        .hero-actions {
            position: absolute;
            display: flex;
            gap: 8px;
            top: 50%;
            transform: translateY(-50%);
        }

        .actions-left { left: 16px; }
        .actions-right { right: 16px; }

        .hero-btn {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 18px;
        }

        .hero-btn:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        /* ═══════════════════════════════
           نظام التحكم في النسخ (Logic Layers)
        ═══════════════════════════════ */
        .pro-badge {
            background: var(--pro-gold);
            color: #000;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 5px;
            display: none;
        }

        [data-user-status="pro"] .pro-badge { display: inline-block; }
        [data-user-status="pro"] .free-only { display: none; }
        [data-user-status="free"] .pro-only { 
            filter: blur(5px);
            pointer-events: none;
            opacity: 0.6;
        }

        /* بانر الترقية */
        .upgrade-banner {
            background: linear-gradient(90deg, #f1c40f, #f39c12);
            color: #fff;
            padding: 15px;
            text-align: center;
            border-radius: 12px;
            margin: 20px auto;
            max-width: 800px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(241, 196, 15, 0.3);
        }

        /* ═══════════════════════════════
           المحتوى والأدوات
        ═══════════════════════════════ */
        .content-wrap {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 480px) {
            .hero-logo-img { height: 60px; }
            .hero-btn { width: 34px; height: 34px; font-size: 16px; }
        }
    </style>
</head>
<body data-user-status="free" data-theme="light">

    <header class="app-hero">
        <div class="hero-container">
            <div class="hero-actions actions-left">
                <button class="hero-btn" onclick="toggleTheme()" title="تبديل الثيم">🌓</button>
            </div>

            <div class="logo-area">
                <img src="logo.png" alt="تدّبير" class="hero-logo-img">
            </div>

            <div class="hero-actions actions-right">
                <span class="pro-badge">PRO</span>
                <button class="hero-btn" onclick="togglePro()" title="حالة الحساب">👑</button>
            </div>
        </div>
    </header>

    <main class="content-wrap">
        <div class="free-only upgrade-banner" onclick="togglePro()">
            ✨ انضم إلى تدّبير PRO واحصل على ميزات حصرية
        </div>

        <section class="card">
            <h3>📍 مخطط الراتب الذكي</h3>
            <p style="color: var(--text-muted);">أدخل راتبك لتوزيع المصاريف تلقائياً.</p>
            </section>

        <section class="card pro-only">
            <h3>📊 تحليلات متقدمة</h3>
            <p>هذا القسم متاح فقط لمشتركي النسخة الاحترافية.</p>
        </section>
    </main>

    <script>
        /* ═══════════════════════════════
           برمجة النظام (Tadabeer Engine)
        ═══════════════════════════════ */
        
        const App = {
            state: {
                theme: localStorage.getItem('td_theme') || 'light',
                status: localStorage.getItem('td_status') || 'free'
            },

            init() {
                this.applyTheme();
                this.applyStatus();
            },

            applyTheme() {
                document.documentElement.setAttribute('data-theme', this.state.theme);
                localStorage.setItem('td_theme', this.state.theme);
            },

            applyStatus() {
                document.body.setAttribute('data-user-status', this.state.status);
                localStorage.setItem('td_status', this.state.status);
            }
        };

        // وظائف الأزرار
        function toggleTheme() {
            const themes = ['light', 'dark', 'midnight'];
            let currentIdx = themes.indexOf(App.state.theme);
            App.state.theme = themes[(currentIdx + 1) % themes.length];
            App.applyTheme();
        }

        function togglePro() {
            // محاكاة لعملية الترقية
            if(App.state.status === 'free') {
                if(confirm("هل تود تجربة نسخة PRO الاحترافية؟")) {
                    App.state.status = 'pro';
                    alert("تم تفعيل ميزات PRO بنجاح! 🚀");
                }
            } else {
                App.state.status = 'free';
            }
            App.applyStatus();
        }

        // تشغيل عند التحميل
        window.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>
</html>
