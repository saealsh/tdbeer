<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فلونس برو — المساعد المالي الذكي</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Tajawal:wght@400;800;900&display=swap" rel="stylesheet">

    <style>
        /* دمج الخط الخاص بك */
        @font-face {
            font-family: 'Gumela';
            src: local('Gumela'), url('Gumela.ttf') format('truetype');
            font-weight: normal;
        }

        :root {
            --bg-deep: #060810;
            --bg-card: #161b27;
            --primary: #3b82f6;
            --accent-gold: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --font-display: 'Gumela', 'Tajawal', sans-serif;
        }

        * { box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: var(--font-display);
            background: var(--bg-deep);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        /* الهيدر المطور */
        .app-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(6, 8, 16, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-img { height: 45px; width: auto; filter: drop-shadow(0 0 8px var(--primary)); }
        .brand-name { font-size: 22px; font-weight: 900; color: var(--text-main); }

        /* البطاقة المالية المركزية */
        .main-card {
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            margin: 15px;
            padding: 25px;
            border-radius: 28px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            position: relative;
            overflow: hidden;
        }

        .main-card::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
        }

        .balance-label { font-size: 13px; color: rgba(255,255,255,0.7); letter-spacing: 1px; }
        .balance-amount { font-size: 34px; font-weight: 900; margin: 10px 0; font-family: 'Tajawal'; }

        /* كاشف التسريبات (Leak Detector) */
        .leak-box {
            background: rgba(245, 158, 11, 0.1);
            border-right: 4px solid var(--accent-gold);
            margin: 15px;
            padding: 15px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* قائمة العمليات التفاعلية */
        .section-title { padding: 0 20px; font-size: 18px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
        .history-list { margin: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .transaction-item {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
        }

        .item-icon {
            width: 45px; height: 45px;
            background: var(--bg-deep);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        /* حقول الإدخال السريعة */
        .quick-add {
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: var(--bg-card);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            display: none; /* تظهر عند النقر على + */
            z-index: 999;
        }

        .input-group { display: flex; gap: 10px; margin-top: 10px; }
        input {
            background: var(--bg-deep);
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 12px;
            flex: 1;
            font-family: var(--font-display);
        }

        /* شريط التنقل السفلي */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(22, 27, 39, 0.95);
            backdrop-filter: blur(15px);
            height: 75px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid var(--border);
            z-index: 1001;
        }

        .nav-btn { color: var(--text-muted); font-size: 24px; cursor: pointer; position: relative; }
        .nav-btn.active { color: var(--primary); }
        .nav-btn.main-add {
            background: var(--primary);
            color: white;
            width: 60px; height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -45px;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
            font-size: 30px;
        }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="logo-area">
            <img src="Vlogo2.svg" class="logo-img" alt="Logo">
            <span class="brand-name">فلونس برو</span>
        </div>
        <div class="nav-btn">🔔</div>
    </header>

    <main>
        <div class="main-card">
            <div class="balance-label">الرصيد المتاح حالياً</div>
            <div class="balance-amount" id="mainBalance">12,450.00 SAR</div>
            <div style="display: flex; gap: 20px; margin-top: 15px;">
                <div>
                    <div class="balance-label">المنصرف</div>
                    <div style="color: var(--danger); font-weight: 800;">3,120 SAR</div>
                </div>
                <div>
                    <div class="balance-label">الادخار</div>
                    <div style="color: var(--success); font-weight: 800;">1,500 SAR</div>
                </div>
            </div>
        </div>

        <div class="leak-box">
            <span>💡</span>
            <div style="font-size: 12px;">
                <b style="color: var(--accent-gold);">نصيحة برو:</b> مصروفات "المطاعم" زادت بنسبة 15% عن الشهر الماضي.
            </div>
        </div>

        <div class="section-title">
            <span>آخر العمليات</span>
            <span style="font-size: 12px; color: var(--primary); cursor: pointer;">عرض الكل</span>
        </div>

        <div class="history-list" id="transactionList">
            <div class="transaction-item">
                <div style="display: flex; gap: 15px; align-items: center;">
                    <div class="item-icon">☕</div>
                    <div>
                        <div style="font-weight: 700;">ستاربكس كافيه</div>
                        <div style="font-size: 11px; color: var(--text-muted);">منذ ساعتين</div>
                    </div>
                </div>
                <div style="font-weight: 900; color: var(--danger);">-24.00</div>
            </div>
        </div>
    </main>

    <div class="quick-add" id="quickAddBox">
        <div style="font-weight: 800; margin-bottom: 10px;">إضافة عملية جديدة</div>
        <div class="input-group">
            <input type="text" id="itemName" placeholder="اسم البند (مثلاً: غذاء)">
            <input type="number" id="itemAmount" placeholder="المبلغ">
        </div>
        <button onclick="addNewItem()" style="width: 100%; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; margin-top: 10px; font-weight: 800; cursor: pointer;">تأكيد الإضافة</button>
    </div>

    <nav class="bottom-nav">
        <div class="nav-btn active">🏠</div>
        <div class="nav-btn">📊</div>
        <div class="nav-btn main-add" onclick="toggleAdd()">+</div>
        <div class="nav-btn">🎯</div>
        <div class="nav-btn">⚙️</div>
    </nav>

    <script>
        // محرك النظام المالي
        let balance = 12450.00;

        function toggleAdd() {
            const box = document.getElementById('quickAddBox');
            box.style.display = box.style.display === 'block' ? 'none' : 'block';
        }

        function addNewItem() {
            const name = document.getElementById('itemName').value;
            const amount = parseFloat(document.getElementById('itemAmount').value);

            if (name && amount) {
                // تحديث الرصيد
                balance -= amount;
                document.getElementById('mainBalance').innerText = balance.toLocaleString() + " SAR";

                // إضافة البند للقائمة
                const list = document.getElementById('transactionList');
                const newItem = `
                    <div class="transaction-item" style="animation: slideIn 0.4s ease-out;">
                        <div style="display: flex; gap: 15px; align-items: center;">
                            <div class="item-icon">💸</div>
                            <div>
                                <div style="font-weight: 700;">${name}</div>
                                <div style="font-size: 11px; color: var(--text-muted);">الآن</div>
                            </div>
                        </div>
                        <div style="font-weight: 900; color: var(--danger);">${-amount.toFixed(2)}</div>
                    </div>
                `;
                list.insertAdjacentHTML('afterbegin', newItem);

                // إغلاق الواجهة وتصفير الحقول
                toggleAdd();
                document.getElementById('itemName').value = '';
                document.getElementById('itemAmount').value = '';
            }
        }
    </script>

    <style>
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</body>
</html>
